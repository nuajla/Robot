stages:
  - build
  - release

variables:
  PYTHON_VERSION: "3.10"
  RELEASE_NAME: "${CI_COMMIT_TAG:-${CI_COMMIT_REF_NAME}}"

build_wheel:
  image: python:${PYTHON_VERSION}
  stage: build
  only:
    - tags 
  script:
    - python -m pip install --no-input build
    - python -m build --wheel
  artifacts:
    paths:
      - dist/

release:
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  stage: release
  only:
    - tags  
  dependencies:
    - build_wheel
  before_script:
    #- glab auth login --hostname "$CI_SERVER_HOST" --job-token $CI_JOB_TOKEN
    - glab auth login --hostname "$CI_SERVER_HOST" --token $PAT
  script:
    - glab release create "$CI_COMMIT_TAG" --name "Release $CI_COMMIT_TAG" --notes "Automated release for $CI_COMMIT_TAG" dist/*.whl
